<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>矢量工具 — 分解次序</title>
  <link rel="stylesheet" href="../shared/s3phy-embed.css">
  <script src="../shared/s3phy-embed-init.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #f8f9fa;
    }
    #app {
      padding: 8px;
      box-sizing: border-box;
    }

    html.s3phy-embed .lang-btn { display: none; }
    html.s3phy-embed,
    html.s3phy-embed body {
      height: 100%;
      overflow: hidden;
      background: #f8f9fa;
    }
    html.s3phy-embed body { padding: 0; }
    html.s3phy-embed #app {
      padding: 4px;
      height: 100%;
      min-height: 0;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }
    html.s3phy-embed .lab-section {
      flex: 1 1 auto;
      min-height: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    html.s3phy-embed .vt-head { display: none; }
    html.s3phy-embed .vt-dash {
      flex: 1 1 auto;
      min-height: 0;
      align-items: stretch;
      flex-wrap: nowrap;
      max-width: none;
      width: 100%;
      margin: 0;
    }
    html.s3phy-embed .vt-viz {
      flex: 1 1 auto;
      min-height: 0;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }
    html.s3phy-embed .vt-canvas {
      width: 100%;
      height: 100%;
      max-width: none;
      flex: 1;
      object-fit: contain;
    }
    html.s3phy-embed .vt-controls {
      flex: 0 0 auto;
      max-height: 100%;
      overflow-y: auto;
    }

    .lab-section {
      --vt-bg: #f8f9fa;
      --vt-panel: #ffffff;
      --vt-border: #e8eaed;
      --vt-text: #1a1c2c;
      --vt-muted: #6b7280;
      --primary: #4a90e2;
      --component: #e74c3c;
      --angle: #f39c12;
      --grid: #95a5a6;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      color: var(--vt-text);
      background: var(--vt-bg);
      border-radius: 12px;
      padding: 12px;
      max-width: 100%;
      box-sizing: border-box;
    }
    .lab-section * { box-sizing: border-box; }

    .vt-head {
      text-align: center;
      margin: 0 0 14px;
      position: relative;
    }
    .vt-title {
      margin: 0;
      font-weight: 800;
      font-size: 1.35rem;
      background: linear-gradient(90deg, #2563eb, #16a34a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .vt-sub {
      color: var(--vt-muted);
      font-size: 0.82rem;
      margin: 4px 0 0;
    }
    .lang-btn {
      position: absolute;
      top: 0;
      right: 0;
      background: #f1f3f5;
      color: var(--vt-muted);
      border: 1px solid var(--vt-border);
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
    }
    .lang-btn:hover {
      color: var(--vt-text);
      border-color: #ced4da;
      background: #e8eaed;
    }

    .vt-dash {
      display: flex;
      flex-direction: row;
      gap: 14px;
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      align-items: flex-start;
      justify-content: center;
      flex-wrap: wrap;
    }
    .vt-viz {
      flex: 2;
      min-width: min(100%, 320px);
      background: var(--vt-panel);
      padding: 10px;
      border-radius: 16px;
      border: 1px solid var(--vt-border);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-shadow: 0 2px 12px rgba(26, 28, 44, 0.04);
      gap: 8px;
    }
    .vt-canvas {
      background: #fff;
      border-radius: 12px;
      width: 100%;
      max-width: min(100%, 960px);
      height: auto;
      min-height: 420px;
      aspect-ratio: 900 / 640;
      display: block;
      border: 1px solid var(--vt-border);
      cursor: crosshair;
      touch-action: none;
    }
    .stamp-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .stamp-btn {
      flex: 1 1 auto;
      min-width: 64px;
      border: 1.5px solid var(--vt-border);
      background: #fff;
      color: var(--vt-text);
      border-radius: 8px;
      padding: 8px 6px;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.15s;
    }
    .stamp-btn:hover { border-color: #94a3b8; background: #f8fafc; }
    .stamp-btn.active {
      border-color: #2563eb;
      background: #eff6ff;
      color: #1d4ed8;
    }
    .stamp-actions {
      display: flex;
      gap: 6px;
    }
    .stamp-actions button {
      flex: 1;
      border: 1px solid var(--vt-border);
      background: #f8f9fa;
      color: var(--vt-muted);
      border-radius: 8px;
      padding: 8px;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
    }
    .stamp-actions button:hover {
      background: #e8eaed;
      color: var(--vt-text);
    }
    details.vt-advanced {
      border: 1px solid var(--vt-border);
      border-radius: 10px;
      background: #f8f9fa;
      padding: 0;
    }
    details.vt-advanced > summary {
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--vt-muted);
      padding: 10px 12px;
      list-style: none;
      user-select: none;
    }
    details.vt-advanced > summary::-webkit-details-marker { display: none; }
    details.vt-advanced > summary::after {
      content: " ▾";
      font-size: 0.7rem;
    }
    details.vt-advanced[open] > summary::after { content: " ▴"; }
    details.vt-advanced .vt-advanced-body {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 0 12px 12px;
    }
    .vt-controls { gap: 12px; }
    .vt-hint {
      margin: 0;
      font-size: 0.78rem;
      color: var(--vt-muted);
      text-align: center;
    }

    .vt-controls {
      flex: 1;
      min-width: min(100%, 280px);
      max-width: min(360px, calc(100% - 24px));
      background: var(--vt-panel);
      border-radius: 16px;
      padding: 18px;
      border: 1px solid var(--vt-border);
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: 0 2px 12px rgba(26, 28, 44, 0.04);
    }
    .vt-section-title {
      margin: 0;
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--primary);
    }
    .vt-section-title.muted { color: var(--vt-muted); }

    .vt-cg {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .vt-lr {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.82rem;
      font-weight: 600;
      gap: 8px;
    }
    .vt-lr label { color: var(--vt-muted); }
    .vt-lr .polar-label { color: var(--primary); }
    .vt-lr .angle-label { color: var(--angle); }

    input[type="number"] {
      width: 72px;
      padding: 4px 6px;
      border: 1px solid var(--vt-border);
      border-radius: 6px;
      text-align: center;
      font-weight: 700;
      font-size: 0.82rem;
      color: var(--vt-text);
      background: #fff;
    }
    .polar-input input[type="number"] {
      border-color: var(--primary);
      color: var(--primary);
      background: #f0f8ff;
    }
    .angle-input input[type="number"] {
      border-color: var(--angle);
      color: var(--angle);
      background: #fff8e1;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      background: transparent;
      margin: 2px 0;
      cursor: pointer;
    }
    input[type="range"]:focus { outline: none; }
    input[type="range"]::-webkit-slider-runnable-track {
      width: 100%;
      height: 6px;
      cursor: pointer;
      background: #e8eaed;
      border-radius: 3px;
    }
    input[type="range"]::-webkit-slider-thumb {
      height: 18px;
      width: 18px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      -webkit-appearance: none;
      margin-top: -6px;
      box-shadow: 0 1px 4px rgba(26, 28, 44, 0.15);
      border: 2px solid #2563eb;
    }
    input[type="range"]::-moz-range-track {
      width: 100%;
      height: 6px;
      cursor: pointer;
      background: #e8eaed;
      border-radius: 3px;
      border: none;
    }
    input[type="range"]::-moz-range-thumb {
      height: 16px;
      width: 16px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      border: 2px solid #2563eb;
      box-shadow: 0 1px 4px rgba(26, 28, 44, 0.15);
    }

    .radio-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      background: #f8f9fa;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--vt-border);
    }
    .radio-group label {
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      color: var(--vt-text);
    }
    .field-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--vt-muted);
      display: block;
      margin-bottom: 4px;
    }

    .check-row {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 8px;
    }
    .check-row input { width: auto; cursor: pointer; }
    .check-row label {
      margin: 0;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--vt-text);
    }

    .upload-btn-wrapper {
      position: relative;
      overflow: hidden;
      display: block;
      width: 100%;
    }
    .btn-upload {
      border: 1px dashed #cbd5e1;
      color: var(--vt-muted);
      background: #f8f9fa;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      transition: 0.15s;
      text-align: center;
    }
    .btn-upload:hover {
      border-color: #2563eb;
      color: #2563eb;
      background: #eff6ff;
    }
    .upload-btn-wrapper input[type="file"] {
      font-size: 100px;
      position: absolute;
      left: 0;
      top: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .vt-reset {
      background: transparent;
      border: 1px solid var(--vt-border);
      color: var(--vt-muted);
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.82rem;
      width: 100%;
      font-weight: 600;
    }
    .vt-reset:hover {
      background: #f1f3f5;
      color: var(--vt-text);
      border-color: #cbd5e1;
    }

    .vt-divider {
      height: 1px;
      background: var(--vt-border);
      margin: 2px 0;
    }

    @media (max-width: 720px) {
      .vt-dash { flex-direction: column; }
      .vt-controls {
        max-width: 100%;
        width: 100%;
      }
      .lang-btn {
        position: static;
        margin-top: 8px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="lab-section">
      <div class="vt-head">
        <h1 class="vt-title" id="page-title">矢量工具 — 受力圖</h1>
        <p class="vt-sub" id="page-sub">調力的大小同方向，再放物件示範</p>
        <button type="button" class="lang-btn" id="lang-toggle">English</button>
      </div>

      <div class="vt-dash">
        <div class="vt-viz">
          <canvas id="vectorCanvas" class="vt-canvas" width="900" height="640"></canvas>
          <p class="vt-hint" id="drag-hint">拖藍色箭嘴改力 · 拖黑點移原點 · 選物件後點圖放置</p>
        </div>

        <div class="vt-controls">
          <h4 class="vt-section-title" id="sec-vector">① 調力</h4>

          <div class="vt-cg polar-input">
            <div class="vt-lr">
              <label class="polar-label" id="label-mag">力的大小 F</label>
              <input type="number" id="numMag" value="7.2" step="0.1" min="0">
            </div>
            <input type="range" id="sliderMag" min="0" max="25" step="0.1" value="7.2">
          </div>

          <div class="vt-cg angle-input">
            <div class="vt-lr">
              <label class="angle-label" id="label-angle">方向角度 θ°</label>
              <input type="number" id="numAngle" value="-33.7" step="1">
            </div>
            <input type="range" id="sliderAngle" min="-180" max="180" step="1" value="-33.7">
          </div>

          <p class="vt-hint" id="panel-tip" style="text-align:left;margin:0;">亦可直接拖圖上藍色箭嘴尖端。</p>

          <div class="vt-divider"></div>
          <h4 class="vt-section-title muted" id="sec-stamps">② 放物件</h4>
          <div class="vt-cg">
            <span class="field-label" id="label-stamps">選一樣，再點圖放上去</span>
            <div class="stamp-row" id="stamp-row">
              <button type="button" class="stamp-btn" data-kind="box" id="stamp-box">箱</button>
              <button type="button" class="stamp-btn" data-kind="person" id="stamp-person">人</button>
              <button type="button" class="stamp-btn" data-kind="ball" id="stamp-ball">球</button>
              <button type="button" class="stamp-btn" data-kind="wedge" id="stamp-wedge">斜面</button>
            </div>
            <div class="stamp-actions">
              <button type="button" id="btn-del-obj">刪除</button>
              <button type="button" id="btn-clear-obj">清空</button>
            </div>
          </div>

          <button type="button" class="vt-reset" id="btn-reset" onclick="resetView()">重設</button>

          <details class="vt-advanced" id="advanced-panel">
            <summary id="sec-advanced">進階設定（老師用）</summary>
            <div class="vt-advanced-body">
              <div>
                <span class="field-label" id="label-angle-ref">量度角由</span>
                <div class="radio-group" style="margin-bottom: 6px;">
                  <label><input type="radio" name="angleRef" value="x" checked> <span id="opt-ref-x">方向 1</span></label>
                  <label><input type="radio" name="angleRef" value="y"> <span id="opt-ref-y">方向 2</span></label>
                </div>
                <div class="radio-group">
                  <label><input type="radio" name="axisPolarity" value="1" checked> <span id="opt-pol-pos">正方向</span></label>
                  <label><input type="radio" name="axisPolarity" value="-1"> <span id="opt-pol-neg">負方向</span></label>
                </div>
              </div>

              <div class="vt-cg">
                <div class="vt-lr">
                  <label id="label-comp1">分量 Fx</label>
                  <input type="number" id="numX" value="6" step="0.1">
                </div>
                <input type="range" id="sliderX" min="-15" max="15" step="0.1" value="6">
              </div>

              <div class="vt-cg">
                <div class="vt-lr">
                  <label id="label-comp2">分量 Fy</label>
                  <input type="number" id="numY" value="4" step="0.1">
                </div>
                <input type="range" id="sliderY" min="-15" max="15" step="0.1" value="4">
              </div>

              <div class="vt-cg">
                <span class="field-label" id="label-comp-style">分量樣式</span>
                <div class="radio-group">
                  <label><input type="radio" name="compStyle" value="head-to-tail" checked> <span id="opt-style-htt">頭尾相接</span></label>
                  <label><input type="radio" name="compStyle" value="origin"> <span id="opt-style-origin">由原點</span></label>
                </div>
              </div>

              <div class="vt-cg">
                <span class="field-label" id="label-decomp">分解次序</span>
                <div class="radio-group">
                  <label><input type="radio" name="decompOrder" value="xy" checked> <span id="opt-order-xy">先水平</span></label>
                  <label><input type="radio" name="decompOrder" value="yx"> <span id="opt-order-yx">先垂直</span></label>
                </div>
              </div>

              <div class="vt-cg">
                <div class="vt-lr">
                  <label id="label-rot">軸旋轉 °</label>
                  <input type="number" id="numRot" value="0" min="-180" max="180">
                </div>
                <input type="range" id="sliderRot" min="-180" max="180" step="1" value="0">
              </div>

              <div class="check-row">
                <input type="checkbox" id="showGrid" checked>
                <label for="showGrid" id="label-grid">顯示方格</label>
              </div>

              <div class="vt-cg">
                <span class="field-label" id="label-upload">背景圖</span>
                <div class="upload-btn-wrapper">
                  <button type="button" class="btn-upload" id="btn-upload-label">上傳圖片</button>
                  <input type="file" id="bgUpload" accept="image/*">
                </div>
              </div>
            </div>
          </details>
        </div>
      </div>
    </div>
  </div>

<script>
(function () {
  const dict = {
    zh: {
      docTitle: '矢量工具 — 受力圖',
      pageTitle: '矢量工具 — 受力圖',
      pageSub: '調力的大小同方向，再放物件示範',
      dragHint: '拖藍色箭嘴改力 · 拖黑點移原點 · 選物件後點圖放置',
      secVector: '① 調力',
      panelTip: '亦可直接拖圖上藍色箭嘴尖端。',
      secStamps: '② 放物件',
      labelStamps: '選一樣，再點圖放上去',
      stampBox: '箱',
      stampPerson: '人',
      stampBall: '球',
      stampWedge: '斜面',
      btnDelObj: '刪除',
      btnClearObj: '清空',
      secAdvanced: '進階設定（老師用）',
      labelMag: '力的大小 F',
      labelAngle: '方向角度 θ°',
      labelAngleRef: '量度角由',
      optRefX: '方向 1',
      optRefY: '方向 2',
      optPolPos: '正方向',
      optPolNeg: '負方向',
      labelComp1: '分量 Fx',
      labelComp2: '分量 Fy',
      labelUpload: '背景圖',
      btnUpload: '上傳圖片',
      labelGrid: '顯示方格',
      labelCompStyle: '分量樣式',
      optStyleHtt: '頭尾相接',
      optStyleOrigin: '由原點',
      labelDecomp: '分解次序',
      optOrderXy: '先水平',
      optOrderYx: '先垂直',
      labelRot: '軸旋轉 °',
      btnReset: '重設',
      dir1: '分解方向 1',
      dir2: '分解方向 2',
      langBtn: 'English'
    },
    en: {
      docTitle: 'Vector Tool — Force Diagram',
      pageTitle: 'Vector Tool — Force Diagram',
      pageSub: 'Set force size and direction, then place objects',
      dragHint: 'Drag the blue arrow tip · Drag the black origin · Pick an object then click to place',
      secVector: '① Set the force',
      panelTip: 'You can also drag the blue arrow tip on the graph.',
      secStamps: '② Place objects',
      labelStamps: 'Pick one, then click the graph',
      stampBox: 'Box',
      stampPerson: 'Person',
      stampBall: 'Ball',
      stampWedge: 'Slope',
      btnDelObj: 'Delete',
      btnClearObj: 'Clear',
      secAdvanced: 'Advanced (for teachers)',
      labelMag: 'Force size F',
      labelAngle: 'Direction angle θ°',
      labelAngleRef: 'Measure angle from',
      optRefX: 'Direction 1',
      optRefY: 'Direction 2',
      optPolPos: 'Positive',
      optPolNeg: 'Negative',
      labelComp1: 'Component Fx',
      labelComp2: 'Component Fy',
      labelUpload: 'Background',
      btnUpload: 'Upload image',
      labelGrid: 'Show grid',
      labelCompStyle: 'Component style',
      optStyleHtt: 'Head-to-tail',
      optStyleOrigin: 'From origin',
      labelDecomp: 'Decomposition order',
      optOrderXy: 'Horizontal first',
      optOrderYx: 'Vertical first',
      labelRot: 'Axis rotation °',
      btnReset: 'Reset',
      dir1: 'Resolving Direction 1',
      dir2: 'Resolving Direction 2',
      langBtn: '中文'
    }
  };

  function hubLangToLocal(lang) {
    if (lang === 'en') return 'en';
    return 'zh';
  }

  const params = new URLSearchParams(location.search);
  let currentLang = hubLangToLocal(params.get('lang') || 'zh');
  const t = () => dict[currentLang] || dict.zh;

  function updateLanguageUI() {
    const tr = t();
    document.documentElement.lang = currentLang === 'zh' ? 'zh-HK' : 'en';
    document.title = tr.docTitle;
    document.getElementById('page-title').textContent = tr.pageTitle;
    document.getElementById('page-sub').textContent = tr.pageSub;
    document.getElementById('drag-hint').textContent = tr.dragHint;
    document.getElementById('lang-toggle').textContent = tr.langBtn;
    document.getElementById('sec-vector').textContent = tr.secVector;
    document.getElementById('panel-tip').textContent = tr.panelTip;
    document.getElementById('sec-stamps').textContent = tr.secStamps;
    document.getElementById('label-stamps').textContent = tr.labelStamps;
    document.getElementById('stamp-box').textContent = tr.stampBox;
    document.getElementById('stamp-person').textContent = tr.stampPerson;
    document.getElementById('stamp-ball').textContent = tr.stampBall;
    document.getElementById('stamp-wedge').textContent = tr.stampWedge;
    document.getElementById('btn-del-obj').textContent = tr.btnDelObj;
    document.getElementById('btn-clear-obj').textContent = tr.btnClearObj;
    document.getElementById('sec-advanced').textContent = tr.secAdvanced;
    document.getElementById('label-mag').textContent = tr.labelMag;
    document.getElementById('label-angle').textContent = tr.labelAngle;
    document.getElementById('label-angle-ref').textContent = tr.labelAngleRef;
    document.getElementById('opt-ref-x').textContent = tr.optRefX;
    document.getElementById('opt-ref-y').textContent = tr.optRefY;
    document.getElementById('opt-pol-pos').textContent = tr.optPolPos;
    document.getElementById('opt-pol-neg').textContent = tr.optPolNeg;
    document.getElementById('label-comp1').textContent = tr.labelComp1;
    document.getElementById('label-comp2').textContent = tr.labelComp2;
    document.getElementById('label-upload').textContent = tr.labelUpload;
    document.getElementById('btn-upload-label').textContent = tr.btnUpload;
    document.getElementById('label-grid').textContent = tr.labelGrid;
    document.getElementById('label-comp-style').textContent = tr.labelCompStyle;
    document.getElementById('opt-style-htt').textContent = tr.optStyleHtt;
    document.getElementById('opt-style-origin').textContent = tr.optStyleOrigin;
    document.getElementById('label-decomp').textContent = tr.labelDecomp;
    document.getElementById('opt-order-xy').textContent = tr.optOrderXy;
    document.getElementById('opt-order-yx').textContent = tr.optOrderYx;
    document.getElementById('label-rot').textContent = tr.labelRot;
    document.getElementById('btn-reset').textContent = tr.btnReset;
    draw();
  }

  document.getElementById('lang-toggle').addEventListener('click', () => {
    currentLang = currentLang === 'zh' ? 'en' : 'zh';
    updateLanguageUI();
  });

  window.addEventListener('message', (ev) => {
    if (ev.data?.type !== 's3phy:lang') return;
    currentLang = hubLangToLocal(ev.data.lang);
    updateLanguageUI();
  });

  // --- Configuration (logical CSS pixels; buffer scaled by DPR) ---
  const canvas = document.getElementById('vectorCanvas');
  const ctx = canvas.getContext('2d');
  let width = 900;
  let height = 640;
  let dpr = 1;
  let scale = 30; // px per unit — finer than old 20

  // State
  let vector = { x: 6, y: -4 }; // Y is Canvas Y (positive down)
  let origin = { x: width / 2, y: height / 2 };
  let axisAngle = 0;
  let bgImage = null;
  let showGrid = true;
  let angleRef = 'x';
  let axisPolarity = 1;
  let compStyle = 'head-to-tail';
  let decompOrder = 'xy';

  /** @type {{ id: number, kind: string, x: number, y: number }[]} */
  let sceneObjects = [];
  let nextObjId = 1;
  let stampKind = null; // 'box' | 'person' | 'ball' | 'wedge' | null
  let selectedObjId = null;
  let isDraggingObject = false;
  let objDragOff = { x: 0, y: 0 };

  let drawnLabels = [];
  let isDraggingVector = false;
  let isDraggingOrigin = false;

  const inputs = {
    mag: document.getElementById('numMag'),
    sliderMag: document.getElementById('sliderMag'),
    angle: document.getElementById('numAngle'),
    sliderAngle: document.getElementById('sliderAngle'),
    x: document.getElementById('numX'),
    y: document.getElementById('numY'),
    sliderX: document.getElementById('sliderX'),
    sliderY: document.getElementById('sliderY'),
    rot: document.getElementById('numRot'),
    sliderRot: document.getElementById('sliderRot'),
    bgUpload: document.getElementById('bgUpload'),
    checkGrid: document.getElementById('showGrid'),
    angleRefs: document.getElementsByName('angleRef'),
    axisPolarities: document.getElementsByName('axisPolarity'),
    compStyles: document.getElementsByName('compStyle'),
    decompOrders: document.getElementsByName('decompOrder')
  };

  function fitCanvas() {
    const parent = canvas.parentElement;
    const cssW = Math.max(320, Math.floor((parent?.clientWidth || 900) - 4));
    let cssH = Math.round(cssW * (640 / 900));
    if (parent && parent.clientHeight > 80) {
      cssH = Math.max(360, Math.min(cssH, parent.clientHeight - 40));
    }
    cssH = Math.max(360, Math.min(720, cssH));
    dpr = Math.min(window.devicePixelRatio || 1, 3);
    width = cssW;
    height = cssH;
    canvas.style.width = `${cssW}px`;
    canvas.style.height = `${cssH}px`;
    canvas.width = Math.round(cssW * dpr);
    canvas.height = Math.round(cssH * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    // Keep origin roughly centered on first layout / if off-canvas
    if (origin.x < 0 || origin.x > width || origin.y < 0 || origin.y > height) {
      origin = { x: width / 2, y: height / 2 };
    }
    draw();
  }

  function resetLogicalTransform() {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  // --- Logic ---

  function getAngleFromRef() {
    let mathAngle = Math.atan2(-vector.y, vector.x);
    let baseOffset = (angleRef === 'x') ? 0 : (Math.PI / 2);
    if (axisPolarity === -1) baseOffset += Math.PI;

    let relAngle = mathAngle - baseOffset;
    let deg = relAngle * 180 / Math.PI;
    while (deg > 180) deg -= 360;
    while (deg < -180) deg += 360;
    return deg;
  }

  function setVectorFromRef(mag, angleDeg) {
    let angleRad = angleDeg * Math.PI / 180;
    let baseOffset = (angleRef === 'x') ? 0 : (Math.PI / 2);
    if (axisPolarity === -1) baseOffset += Math.PI;

    let mathAngle = angleRad + baseOffset;
    vector.x = mag * Math.cos(mathAngle);
    vector.y = -mag * Math.sin(mathAngle);
  }

  function updateUI(skipActiveElement = null) {
    const mag = Math.hypot(vector.x, vector.y);
    const displayAngle = getAngleFromRef();

    if (skipActiveElement !== inputs.mag) inputs.mag.value = mag.toFixed(1);
    if (skipActiveElement !== inputs.sliderMag) inputs.sliderMag.value = mag;

    if (skipActiveElement !== inputs.angle) inputs.angle.value = displayAngle.toFixed(1);
    if (skipActiveElement !== inputs.sliderAngle) inputs.sliderAngle.value = displayAngle;

    if (skipActiveElement !== inputs.x) inputs.x.value = vector.x.toFixed(1);
    if (skipActiveElement !== inputs.sliderX) inputs.sliderX.value = vector.x;

    if (skipActiveElement !== inputs.y) inputs.y.value = (-vector.y).toFixed(1);
    if (skipActiveElement !== inputs.sliderY) inputs.sliderY.value = -vector.y;

    inputs.rot.value = axisAngle;
    inputs.sliderRot.value = axisAngle;

    draw();
  }

  function onMagnitudeInput(e) {
    let newMag = parseFloat(e.target.value);
    if (isNaN(newMag) || newMag < 0) newMag = 0;
    setVectorFromRef(newMag, getAngleFromRef());
    updateUI(e.target);
  }

  function onAngleInput(e) {
    let newAngle = parseFloat(e.target.value);
    setVectorFromRef(Math.hypot(vector.x, vector.y), newAngle);
    updateUI(e.target);
  }

  function onComponentInput(e) {
    vector.x = parseFloat(inputs.sliderX.value);
    vector.y = -parseFloat(inputs.sliderY.value);
    updateUI(e.target);
  }

  function onComponentTextInput(e) {
    vector.x = parseFloat(inputs.x.value);
    vector.y = -parseFloat(inputs.y.value);
    updateUI(e.target);
  }

  inputs.angleRefs.forEach(radio => {
    radio.addEventListener('change', (e) => { angleRef = e.target.value; updateUI(); });
  });
  inputs.axisPolarities.forEach(radio => {
    radio.addEventListener('change', (e) => { axisPolarity = parseInt(e.target.value); updateUI(); });
  });
  inputs.compStyles.forEach(radio => {
    radio.addEventListener('change', (e) => { compStyle = e.target.value; draw(); });
  });
  inputs.decompOrders.forEach(radio => {
    radio.addEventListener('change', (e) => { decompOrder = e.target.value; draw(); });
  });

  inputs.sliderMag.addEventListener('input', onMagnitudeInput);
  inputs.mag.addEventListener('input', onMagnitudeInput);
  inputs.sliderAngle.addEventListener('input', onAngleInput);
  inputs.angle.addEventListener('input', onAngleInput);
  inputs.sliderX.addEventListener('input', onComponentInput);
  inputs.sliderY.addEventListener('input', onComponentInput);
  inputs.x.addEventListener('input', onComponentTextInput);
  inputs.y.addEventListener('input', onComponentTextInput);

  inputs.sliderRot.addEventListener('input', () => {
    axisAngle = parseFloat(inputs.sliderRot.value);
    updateUI();
  });
  inputs.rot.addEventListener('input', () => {
    let val = parseFloat(inputs.rot.value);
    if (!isNaN(val)) {
      axisAngle = Math.max(-180, Math.min(180, val));
      updateUI();
    }
  });

  inputs.bgUpload.addEventListener('change', function (e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function (event) {
      const img = new Image();
      img.onload = function () { bgImage = img; draw(); };
      img.src = event.target.result;
    };
    reader.readAsDataURL(file);
  });

  inputs.checkGrid.addEventListener('change', (e) => { showGrid = e.target.checked; draw(); });

  function setStampKind(kind) {
    stampKind = stampKind === kind ? null : kind;
    document.querySelectorAll('.stamp-btn').forEach((btn) => {
      btn.classList.toggle('active', btn.dataset.kind === stampKind);
    });
    canvas.style.cursor = stampKind ? 'copy' : 'crosshair';
  }

  document.querySelectorAll('.stamp-btn').forEach((btn) => {
    btn.addEventListener('click', () => setStampKind(btn.dataset.kind));
  });

  function deleteSelectedObj() {
    if (selectedObjId == null) return;
    sceneObjects = sceneObjects.filter((o) => o.id !== selectedObjId);
    selectedObjId = null;
    draw();
  }

  document.getElementById('btn-del-obj').addEventListener('click', deleteSelectedObj);
  document.getElementById('btn-clear-obj').addEventListener('click', () => {
    sceneObjects = [];
    selectedObjId = null;
    draw();
  });
  window.addEventListener('keydown', (e) => {
    if (e.key === 'Delete' || e.key === 'Backspace') {
      if (['INPUT', 'TEXTAREA'].includes(document.activeElement?.tagName)) return;
      e.preventDefault();
      deleteSelectedObj();
    }
    if (e.key === 'Escape') setStampKind(null);
  });

  window.resetView = function () {
    origin = { x: width / 2, y: height / 2 };
    axisAngle = 0;
    vector = { x: 6, y: -4 };
    angleRef = 'x';
    axisPolarity = 1;
    compStyle = 'head-to-tail';
    decompOrder = 'xy';
    sceneObjects = [];
    selectedObjId = null;
    setStampKind(null);
    inputs.angleRefs[0].checked = true;
    inputs.axisPolarities[0].checked = true;
    inputs.compStyles[0].checked = true;
    inputs.decompOrders[0].checked = true;
    updateUI();
  };

  function screenToLocal(screenX, screenY) {
    let dx = screenX - origin.x;
    let dy = screenY - origin.y;
    let rad = -axisAngle * Math.PI / 180;
    let localX = dx * Math.cos(rad) - dy * Math.sin(rad);
    let localY = dx * Math.sin(rad) + dy * Math.cos(rad);
    return { x: localX / scale, y: localY / scale };
  }

  function getPointerPos(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (clientX - rect.left) * (width / rect.width),
      y: (clientY - rect.top) * (height / rect.height)
    };
  }

  function getMousePos(evt) {
    return getPointerPos(evt.clientX, evt.clientY);
  }

  function tipScreenPos() {
    let rad = axisAngle * Math.PI / 180;
    let tipLocalX = vector.x * scale;
    let tipLocalY = vector.y * scale;
    return {
      x: origin.x + (tipLocalX * Math.cos(rad) - tipLocalY * Math.sin(rad)),
      y: origin.y + (tipLocalX * Math.sin(rad) + tipLocalY * Math.cos(rad))
    };
  }

  function objectHitRadius(kind) {
    if (kind === 'ball') return 28;
    if (kind === 'person') return 36;
    if (kind === 'wedge') return 40;
    return 34; // box
  }

  function hitTestObject(pos) {
    for (let i = sceneObjects.length - 1; i >= 0; i--) {
      const o = sceneObjects[i];
      if (Math.hypot(pos.x - o.x, pos.y - o.y) <= objectHitRadius(o.kind)) return o;
    }
    return null;
  }

  function beginDragAt(pos, forceOrigin) {
    if (stampKind) {
      sceneObjects.push({ id: nextObjId++, kind: stampKind, x: pos.x, y: pos.y });
      selectedObjId = nextObjId - 1;
      draw();
      return;
    }

    const hit = hitTestObject(pos);
    if (hit) {
      selectedObjId = hit.id;
      isDraggingObject = true;
      isDraggingVector = false;
      isDraggingOrigin = false;
      objDragOff = { x: pos.x - hit.x, y: pos.y - hit.y };
      draw();
      return;
    }

    selectedObjId = null;
    const distOrigin = Math.hypot(pos.x - origin.x, pos.y - origin.y);
    const tip = tipScreenPos();
    const distTip = Math.hypot(pos.x - tip.x, pos.y - tip.y);
    const grab = 16;

    if (forceOrigin || distOrigin < grab) {
      isDraggingOrigin = true;
      isDraggingVector = false;
    } else if (distTip < grab) {
      isDraggingVector = true;
      isDraggingOrigin = false;
    } else {
      draw();
    }
  }

  function moveDragAt(pos) {
    if (isDraggingObject && selectedObjId != null) {
      const o = sceneObjects.find((x) => x.id === selectedObjId);
      if (o) {
        o.x = pos.x - objDragOff.x;
        o.y = pos.y - objDragOff.y;
        draw();
      }
    } else if (isDraggingOrigin) {
      origin.x = pos.x;
      origin.y = pos.y;
      draw();
    } else if (isDraggingVector) {
      const local = screenToLocal(pos.x, pos.y);
      vector.x = Math.max(-20, Math.min(20, local.x));
      vector.y = Math.max(-20, Math.min(20, local.y));
      updateUI();
    }
  }

  function endDrag() {
    isDraggingVector = false;
    isDraggingOrigin = false;
    isDraggingObject = false;
  }

  canvas.addEventListener('mousedown', (e) => {
    beginDragAt(getMousePos(e), e.button === 2 || e.shiftKey);
  });
  canvas.addEventListener('mousemove', (e) => moveDragAt(getMousePos(e)));
  window.addEventListener('mouseup', endDrag);
  canvas.addEventListener('contextmenu', e => e.preventDefault());

  canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) return;
    e.preventDefault();
    const touch = e.touches[0];
    beginDragAt(getPointerPos(touch.clientX, touch.clientY), false);
  }, { passive: false });
  canvas.addEventListener('touchmove', (e) => {
    if (e.touches.length !== 1) return;
    if (!isDraggingOrigin && !isDraggingVector && !isDraggingObject) return;
    e.preventDefault();
    const touch = e.touches[0];
    moveDragAt(getPointerPos(touch.clientX, touch.clientY));
  }, { passive: false });
  canvas.addEventListener('touchend', endDrag);
  canvas.addEventListener('touchcancel', endDrag);

  // --- Drawing ---

  function drawBackground(c) {
    if (!bgImage) return;
    const hRatio = width / bgImage.width;
    const vRatio = height / bgImage.height;
    const ratio = Math.min(hRatio, vRatio);
    const centerShift_x = (width - bgImage.width * ratio) / 2;
    const centerShift_y = (height - bgImage.height * ratio) / 2;
    c.save();
    c.globalAlpha = 0.5;
    c.drawImage(bgImage, 0, 0, bgImage.width, bgImage.height,
      centerShift_x, centerShift_y, bgImage.width * ratio, bgImage.height * ratio);
    c.restore();
  }

  function drawSceneObject(c, o) {
    const selected = o.id === selectedObjId;
    c.save();
    c.translate(o.x, o.y);
    if (selected) {
      c.strokeStyle = '#2563eb';
      c.lineWidth = 2;
      c.setLineDash([4, 3]);
      c.strokeRect(-42, -42, 84, 84);
      c.setLineDash([]);
    }
    if (o.kind === 'box') {
      c.fillStyle = '#c4a484';
      c.strokeStyle = '#7c5c3e';
      c.lineWidth = 2;
      c.fillRect(-30, -22, 60, 44);
      c.strokeRect(-30, -22, 60, 44);
      c.strokeStyle = 'rgba(0,0,0,0.15)';
      c.beginPath();
      c.moveTo(-10, -22); c.lineTo(-10, 22);
      c.moveTo(10, -22); c.lineTo(10, 22);
      c.stroke();
    } else if (o.kind === 'ball') {
      c.fillStyle = '#94a3b8';
      c.strokeStyle = '#475569';
      c.lineWidth = 2;
      c.beginPath();
      c.arc(0, 0, 26, 0, Math.PI * 2);
      c.fill();
      c.stroke();
      c.fillStyle = 'rgba(255,255,255,0.35)';
      c.beginPath();
      c.arc(-8, -8, 8, 0, Math.PI * 2);
      c.fill();
    } else if (o.kind === 'person') {
      c.fillStyle = '#1e293b';
      c.beginPath();
      c.arc(0, -28, 10, 0, Math.PI * 2);
      c.fill();
      c.fillRect(-9, -16, 18, 28);
      c.fillRect(-14, 12, 8, 18);
      c.fillRect(6, 12, 8, 18);
      c.fillRect(-22, -10, 14, 6);
      c.fillRect(8, -10, 14, 6);
    } else if (o.kind === 'wedge') {
      c.fillStyle = '#a8b5c4';
      c.strokeStyle = '#64748b';
      c.lineWidth = 2;
      c.beginPath();
      c.moveTo(-36, 22);
      c.lineTo(36, 22);
      c.lineTo(36, -8);
      c.closePath();
      c.fill();
      c.stroke();
    }
    c.restore();
  }

  function drawArrow(c, fromX, fromY, toX, toY, color, lineW, dashed) {
    const headLen = 14;
    const angle = Math.atan2(toY - fromY, toX - fromX);
    c.beginPath();
    c.lineWidth = lineW;
    c.strokeStyle = color;
    c.fillStyle = color;
    if (dashed) c.setLineDash([5, 5]); else c.setLineDash([]);
    c.moveTo(fromX, fromY); c.lineTo(toX, toY); c.stroke();
    c.setLineDash([]);
    c.beginPath();
    c.moveTo(toX, toY);
    c.lineTo(toX - headLen * Math.cos(angle - Math.PI / 6), toY - headLen * Math.sin(angle - Math.PI / 6));
    c.lineTo(toX - headLen * Math.cos(angle + Math.PI / 6), toY - headLen * Math.sin(angle + Math.PI / 6));
    c.fill();
  }

  function isIntersecting(r1, r2) {
    return !(r2.x > r1.x + r1.w || r2.x + r2.w < r1.x || r2.y > r1.y + r1.h || r2.y + r2.h < r1.y);
  }

  function drawSmartLabel(c, text, x, y, align, baseline, color = "#444") {
    c.save();
    resetLogicalTransform();
    c.font = "bold 14px system-ui, sans-serif";
    c.textAlign = "left";
    c.textBaseline = "top";

    const metrics = c.measureText(text);
    const textWidth = metrics.width;
    const textHeight = 14;
    const padding = 4;

    let boxX = x;
    let boxY = y;
    if (align === "right") boxX = x - textWidth;
    else if (align === "center") boxX = x - textWidth / 2;
    if (baseline === "middle") boxY = y - textHeight / 2;
    else if (baseline === "bottom") boxY = y - textHeight;

    let box = { x: boxX - padding, y: boxY - padding, w: textWidth + padding * 2, h: textHeight + padding * 2 };
    let attempts = 0;
    let overlapFound = true;
    while (overlapFound && attempts < 10) {
      overlapFound = false;
      for (let other of drawnLabels) {
        if (isIntersecting(box, other)) {
          overlapFound = true;
          box.y = other.y + other.h + 2;
          break;
        }
      }
      attempts++;
    }
    drawnLabels.push(box);
    c.fillStyle = "rgba(255, 255, 255, 0.92)";
    c.fillRect(box.x, box.y, box.w, box.h);
    c.fillStyle = color;
    c.fillText(text, box.x + padding, box.y + padding);
    c.restore();
  }

  function drawGrid(c) {
    if (!showGrid) return;
    const gridSize = 40;
    c.strokeStyle = 'rgba(0,0,0,0.12)';
    c.lineWidth = 1;
    for (let i = -gridSize; i <= gridSize; i++) {
      c.beginPath(); c.moveTo(i * scale, -gridSize * scale); c.lineTo(i * scale, gridSize * scale); c.stroke();
      c.beginPath(); c.moveTo(-gridSize * scale, i * scale); c.lineTo(gridSize * scale, i * scale); c.stroke();
    }
    c.strokeStyle = '#444';
    c.lineWidth = 2;
    c.beginPath();
    c.moveTo(0, -gridSize * scale); c.lineTo(0, gridSize * scale);
    c.moveTo(-gridSize * scale, 0); c.lineTo(gridSize * scale, 0);
    c.stroke();

    c.save();
    resetLogicalTransform();
    const pad = 20;
    const bounds = { minX: pad, minY: pad, maxX: width - pad, maxY: height - pad };
    const rad = axisAngle * Math.PI / 180;
    const dir1 = { x: Math.cos(rad), y: Math.sin(rad) };
    const dir2 = { x: -Math.sin(rad), y: Math.cos(rad) };

    function getClampedPoint(dir) {
      let tMax = Infinity;
      if (dir.x > 0) tMax = Math.min(tMax, (bounds.maxX - origin.x) / dir.x);
      else if (dir.x < 0) tMax = Math.min(tMax, (bounds.minX - origin.x) / dir.x);
      if (dir.y > 0) tMax = Math.min(tMax, (bounds.maxY - origin.y) / dir.y);
      else if (dir.y < 0) tMax = Math.min(tMax, (bounds.minY - origin.y) / dir.y);
      return { x: origin.x + tMax * dir.x, y: origin.y + tMax * dir.y };
    }

    const p1 = getClampedPoint(dir1);
    const p2 = getClampedPoint({ x: -dir2.x, y: -dir2.y });
    const tr = t();
    drawSmartLabel(c, tr.dir1, p1.x - dir1.x * 10, p1.y - dir1.y * 10, "right", "middle");
    drawSmartLabel(c, tr.dir2, p2.x - (-dir2.x) * 10, p2.y - (-dir2.y) * 10, "left", "middle");
    c.restore();
  }

  function drawAngle(c, tipX, tipY) {
    const radius = 48;
    const mathAngle = Math.atan2(tipY, tipX);
    c.beginPath();
    c.strokeStyle = '#f39c12';
    c.lineWidth = 2.5;
    let startAngle = 0;
    if (angleRef === 'x') startAngle = (axisPolarity === 1) ? 0 : Math.PI;
    else startAngle = (axisPolarity === 1) ? -Math.PI / 2 : Math.PI / 2;

    let diff = mathAngle - startAngle;
    while (diff > Math.PI) diff -= 2 * Math.PI;
    while (diff < -Math.PI) diff += 2 * Math.PI;
    c.arc(0, 0, radius, startAngle, mathAngle, diff < 0);
    c.stroke();

    let midRad = startAngle + diff / 2;
    let labelRadius = radius + 18;
    const lx = labelRadius * Math.cos(midRad);
    const ly = labelRadius * Math.sin(midRad);
    let rad = axisAngle * Math.PI / 180;
    let gx = origin.x + (lx * Math.cos(rad) - ly * Math.sin(rad));
    let gy = origin.y + (lx * Math.sin(rad) + ly * Math.cos(rad));
    const theta = getAngleFromRef();
    c.save();
    resetLogicalTransform();
    drawSmartLabel(c, `θ = ${theta.toFixed(1)}°`, gx, gy, "center", "middle", "#f39c12");
    c.restore();
  }

  function drawLabels(c, tipX, tipY) {
    let labelH = angleRef === 'x' ? "F cos θ" : "F sin θ";
    let labelV = angleRef === 'x' ? "F sin θ" : "F cos θ";
    let hX, hY, vX, vY;
    let hAlign = "center", hBase = "top";
    let vAlign = "left", vBase = "middle";

    if (compStyle === 'head-to-tail') {
      if (decompOrder === 'xy') {
        hX = tipX / 2;
        hY = (tipY < 0) ? 12 : -22;
        if (tipY >= 0) hBase = "bottom";
        vX = tipX + 12;
        vY = tipY / 2;
      } else {
        vX = -12;
        vY = tipY / 2;
        vAlign = "right";
        hX = tipX / 2;
        hY = tipY + ((tipY < 0) ? -22 : 12);
        hBase = (tipY < 0) ? "bottom" : "top";
      }
    } else {
      hX = tipX / 2;
      hY = (tipY < 0) ? 12 : -22;
      if (tipY >= 0) hBase = "bottom";
      vX = -12;
      vY = tipY / 2;
      vAlign = "right";
    }

    let rad = axisAngle * Math.PI / 180;
    function localToGlobal(lx, ly) {
      return {
        x: origin.x + (lx * Math.cos(rad) - ly * Math.sin(rad)),
        y: origin.y + (lx * Math.sin(rad) + ly * Math.cos(rad))
      };
    }
    const mag = Math.hypot(vector.x, vector.y);
    let gH = localToGlobal(hX, hY);
    let gV = localToGlobal(vX, vY);
    let gR = localToGlobal(tipX / 2 - 12, tipY / 2 - 12);

    c.save();
    resetLogicalTransform();
    drawSmartLabel(c, labelH, gH.x, gH.y, hAlign, hBase, "#e74c3c");
    drawSmartLabel(c, labelV, gV.x, gV.y, vAlign, vBase, "#e74c3c");
    drawSmartLabel(c, `F = ${mag.toFixed(1)}`, gR.x, gR.y, "right", "bottom", "#2563eb");
    c.restore();
  }

  function drawComponents(c, tipX, tipY) {
    if (compStyle === 'head-to-tail') {
      if (decompOrder === 'xy') {
        drawArrow(c, 0, 0, tipX, 0, '#e74c3c', 2.5, false);
        drawArrow(c, tipX, 0, tipX, tipY, '#e74c3c', 2.5, false);
      } else {
        drawArrow(c, 0, 0, 0, tipY, '#e74c3c', 2.5, false);
        drawArrow(c, 0, tipY, tipX, tipY, '#e74c3c', 2.5, false);
      }
    } else {
      drawArrow(c, 0, 0, tipX, 0, '#e74c3c', 2.5, false);
      drawArrow(c, 0, 0, 0, tipY, '#e74c3c', 2.5, false);
      c.setLineDash([5, 5]);
      c.strokeStyle = '#e74c3c';
      c.lineWidth = 1;
      c.beginPath();
      c.moveTo(tipX, 0); c.lineTo(tipX, tipY);
      c.stroke();
      c.beginPath();
      c.moveTo(0, tipY); c.lineTo(tipX, tipY);
      c.stroke();
      c.setLineDash([]);
    }
  }

  function draw() {
    drawnLabels = [];
    resetLogicalTransform();
    ctx.clearRect(0, 0, width, height);

    drawBackground(ctx);
    sceneObjects.forEach((o) => drawSceneObject(ctx, o));

    ctx.translate(origin.x, origin.y);
    ctx.rotate(axisAngle * Math.PI / 180);

    drawGrid(ctx);

    const tipX = vector.x * scale;
    const tipY = vector.y * scale;

    drawAngle(ctx, tipX, tipY);
    drawComponents(ctx, tipX, tipY);
    // Resultant force — thicker for classroom visibility
    drawArrow(ctx, 0, 0, tipX, tipY, '#4a90e2', 4, false);
    drawLabels(ctx, tipX, tipY);

    ctx.beginPath();
    ctx.arc(0, 0, 5, 0, Math.PI * 2);
    ctx.fillStyle = "#333";
    ctx.fill();
  }

  window.addEventListener('resize', () => {
    const ox = origin.x / width;
    const oy = origin.y / height;
    fitCanvas();
    origin.x = ox * width;
    origin.y = oy * height;
    draw();
  });

  updateLanguageUI();
  fitCanvas();
  updateUI();
})();
</script>
</body>
</html>
