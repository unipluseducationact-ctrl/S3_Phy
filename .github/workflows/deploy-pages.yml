name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      auto_retry:
        description: 'Triggered by auto-retry workflow after a prior failure'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

# Wait for in-flight deploys instead of cancelling (avoids "Deployment failed, try again later").
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages (attempt 1)
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait 45s before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 45

      - name: Deploy to GitHub Pages (attempt 2)
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait 60s before retry
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        run: sleep 60

      - name: Deploy to GitHub Pages (attempt 3)
        id: deployment_retry2
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait 90s before retry
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure' && steps.deployment_retry2.outcome == 'failure'
        run: sleep 90

      - name: Deploy to GitHub Pages (attempt 4)
        id: deployment_retry3
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure' && steps.deployment_retry2.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait 120s before retry
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure' && steps.deployment_retry2.outcome == 'failure' && steps.deployment_retry3.outcome == 'failure'
        run: sleep 120

      - name: Deploy to GitHub Pages (attempt 5)
        id: deployment_retry4
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure' && steps.deployment_retry2.outcome == 'failure' && steps.deployment_retry3.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Fail if all deploy attempts failed
        if: >-
          steps.deployment.outcome == 'failure' &&
          steps.deployment_retry.outcome == 'failure' &&
          steps.deployment_retry2.outcome == 'failure' &&
          steps.deployment_retry3.outcome == 'failure' &&
          steps.deployment_retry4.outcome == 'failure'
        run: |
          echo "GitHub Pages deploy failed after 5 attempts (transient API error)."
          echo "The auto-retry workflow will dispatch another deploy in ~3 minutes."
          echo "If this persists, check Settings → Pages uses GitHub Actions only (not branch /dist)."
          exit 1
