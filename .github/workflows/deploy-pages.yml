name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
      # GitHub Pages serves this folder at /REPO/. Artifact root = site root, so we nest
      # built files under dist/ to match https://<user>.github.io/S3_PHY/dist/
      - name: Layout Pages root (dist/ + root redirect)
        run: |
          mkdir -p _pages/dist
          cp -r dist/. _pages/dist/
          cp scripts/github-pages-repo-root-redirect.html _pages/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
