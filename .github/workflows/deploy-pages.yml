name: Deploy to GitHub Pages

# Shell-only workflow: no marketplace actions (codeload.github.com downloads fail on this repo).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Clone, build, publish gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git clone --depth 1 "https://x-access-token:${GITHUB_TOKEN}@github.com/unipluseducationact-ctrl/S3_Phy.git" repo
          cd repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
          sudo apt-get install -y nodejs
          npm ci
          npm run build
          mkdir -p _site/dist
          cp -r dist/. _site/dist/
          cp scripts/github-pages-repo-root-redirect.html _site/index.html
          touch _site/.nojekyll _site/dist/.nojekyll
          cd _site
          git init
          git checkout -b gh-pages
          git add -A
          git commit -m "Deploy site from ${GITHUB_SHA}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/unipluseducationact-ctrl/S3_Phy.git" gh-pages
