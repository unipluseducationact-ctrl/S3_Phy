name: Deploy to GitHub Pages

# Publishes to the gh-pages branch (git push). Avoids actions/upload-pages-artifact,
# which is currently failing to download from codeload.github.com on this repo.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Prepare site bundle (root redirect + dist/)
        run: |
          mkdir -p _site/dist
          cp -r dist/. _site/dist/
          cp scripts/github-pages-repo-root-redirect.html _site/index.html
          touch _site/.nojekyll _site/dist/.nojekyll
      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
