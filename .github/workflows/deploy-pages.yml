name: Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Validates the production build. Live deploy: Settings → Pages → branch main → folder /dist
  # (committed dist/ already includes summary PDFs and bundled assets).
  verify-build:
    runs-on: ubuntu-latest
    steps:
      - name: Verify npm build
        run: |
          set -euxo pipefail
          git clone --depth 1 https://github.com/unipluseducationact-ctrl/S3_Phy.git repo
          cd repo
          node --version
          npm ci
          npm run build
