<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拋體運動</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-color: #1e293b;
            --text-color: #e2e8f0;
            --input-bg: #334155;
            --border-color: #475569;
            
            /* Ball A Family (Cold) */
            --color-a: #38bdf8;       /* Sky Blue */
            --color-a-x: #22d3ee;     /* Cyan */
            --color-a-y: #a855f7;     /* Purple */
            
            /* Ball B Family (Warm) */
            --color-b: #fbbf24;       /* Amber */
            --color-b-x: #facc15;     /* Yellow */
            --color-b-y: #ef4444;     /* Red */
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }

        #canvas-container {
            flex: 1; position: relative; width: 100%; overflow: hidden;
            background-image: 
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        canvas { display: block; }

        /* Left Sidebar Container */
        .left-sidebar {
            position: absolute; top: 20px; left: 20px; bottom: 20px;
            width: 240px;
            display: flex; flex-direction: column; gap: 15px;
            pointer-events: none; /* 讓點擊穿透空白處 */
            z-index: 20;
        }

        /* Common Panel Style */
        .panel-box {
            background: rgba(15, 23, 42, 0.9); 
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 12px;
            pointer-events: auto; /* 恢復面板的點擊 */
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* Logo Specific */
        .logo-container {
            background-color: #ffffff; 
            padding: 12px 0;
            display: flex; align-items: center; justify-content: center;
        }
        .logo-container img { 
            height: 80px; width: auto; display: block; 
        }

        /* Legend Specific */
        .legend {
            display: flex; flex-direction: column; gap: 8px;
            font-size: 0.85rem; color: #94a3b8;
        }
        .legend-row { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
        .legend-group { display: flex; align-items: center; gap: 6px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot-hollow { width: 10px; height: 10px; border: 2px solid; border-radius: 50%; background: transparent; }
        .legend-label { color: #e2e8f0; font-weight: bold; width: 50px;}

        /* Stats Specific */
        .stats {
            font-family: monospace; font-size: 0.9rem;
            display: flex; flex-direction: column; gap: 15px;
        }
        .stat-group h4 { margin: 0 0 8px 0; border-bottom: 1px solid #334155; padding-bottom: 4px; }
        .stat-row { margin-bottom: 4px; display: flex; justify-content: space-between; gap: 10px;}
        .stat-divider { margin: 5px 0; border-top: 1px dashed #334155; }
        .stat-highlight { color: #fff; font-weight: bold; }

        /* Controls */
        #controls {
            background-color: var(--panel-color); padding: 10px 20px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; gap: 10px;
            z-index: 10; max-height: 40vh; overflow-y: auto;
        }

        .global-controls {
            display: flex; justify-content: center; gap: 20px; align-items: center;
            padding-bottom: 10px; border-bottom: 1px solid var(--border-color);
        }

        .params-container {
            display: flex; justify-content: center; gap: 40px; flex-wrap: wrap;
        }
        .param-column {
            flex: 1; max-width: 400px; min-width: 280px;
            background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px;
            border-top: 4px solid #888;
        }
        .col-a { border-color: var(--color-a); }
        .col-b { border-color: var(--color-b); }

        .col-header { font-weight: bold; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .text-a { color: var(--color-a); }
        .text-b { color: var(--color-b); }

        .control-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 8px; }
        .label-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; color: #94a3b8; }

        input[type="number"] {
            background-color: var(--input-bg); color: white;
            border: 1px solid var(--border-color); border-radius: 4px;
            width: 55px; padding: 2px 5px; font-family: monospace; font-weight: bold;
            font-size: 0.9rem; text-align: right;
        }
        .col-a input[type="number"] { color: var(--color-a); }
        .col-b input[type="number"] { color: var(--color-b); }
        
        input[type="range"] { width: 100%; cursor: pointer; height: 6px; }
        .col-a input[type="range"] { accent-color: var(--color-a); }
        .col-b input[type="range"] { accent-color: var(--color-b); }

        button {
            padding: 8px 16px; border: none; border-radius: 6px;
            font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 0.9rem; color: #0f172a;
        }
        .btn-a { background-color: var(--color-a); }
        .btn-a:hover { background-color: #7dd3fc; }
        .btn-b { background-color: var(--color-b); }
        .btn-b:hover { background-color: #fcd34d; }
        .btn-both { background: linear-gradient(90deg, var(--color-a) 0%, var(--color-b) 100%); color: #0f172a; }
        .btn-both:hover { opacity: 0.9; }
        .btn-reset { background-color: #475569; color: white; }
        .btn-reset:hover { background-color: #64748b; }

        .checkbox-wrapper {
            display: flex; align-items: center; gap: 8px; cursor: pointer;
            background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 6px;
        }
        .checkbox-wrapper input { width: 16px; height: 16px; cursor: pointer; }
        .checkbox-wrapper span { font-size: 0.9rem; color: #e2e8f0; }
    </style>
</head>
<body>

    <div id="canvas-container">
        <canvas id="simCanvas"></canvas>
        
        <!-- Left Sidebar: Logo, Legend, Stats -->
        <div class="left-sidebar">
            
            <!-- 1. Logo -->
            <div class="panel-box logo-container">
                <img src="https://d41chssnpqdne.cloudfront.net/user_upload_by_module/chat_bot/files/176719383/NBv6wM50y3t43rOf.png?Expires=1766401478&Signature=A06kcTNHs9ZYWA2ICapq4NnKxGTZd3lrOULAkYYQmuns5mu3zSNsZMBDQMEpdvsB70vXOQJLoQKeo9fkKiNSGOEYUnnxXrsMqwFYdD1ju0V6SkzubG72IXckPE81qQbz5AApwyBSUtnnL-16ebgEtoD8~hxAbw4L--ucmwWtBaesBQx5B~0SkY~Qy7gAdNRaGzDjwwbYV4JHd1PRRtUQ7gFu2pewctIPXSM3FGIVkL3rgtYfSrNy2jS-oInN22KMk9IXLVkStxjM04ElgpK4lmDYgpAD2o3g2ARWBmukWKj5Wf-7EsAu~UlwqoLl-dE74vZuup-qrEUND2ZC34OsUA__&Key-Pair-Id=K3USGZIKWMDCSX" alt="Unit Education Logo">
            </div>

            <!-- 2. Legend -->
            <div class="panel-box legend">
                <div class="legend-row">
                    <div class="legend-label" style="color:var(--color-a)">Ball A</div>
                    <div class="legend-group" title="實體球">
                        <div class="dot" style="background:var(--color-a)"></div>
                    </div>
                    <div class="legend-group" title="X 軸投影">
                        <div class="dot-hollow" style="border-color:var(--color-a-x)"></div>
                        <span style="font-size:0.75rem; color:var(--color-a-x)">X</span>
                    </div>
                    <div class="legend-group" title="Y 軸投影">
                        <div class="dot-hollow" style="border-color:var(--color-a-y)"></div>
                        <span style="font-size:0.75rem; color:var(--color-a-y)">Y</span>
                    </div>
                </div>

                <div class="legend-row">
                    <div class="legend-label" style="color:var(--color-b)">Ball B</div>
                    <div class="legend-group" title="實體球">
                        <div class="dot" style="background:var(--color-b)"></div>
                    </div>
                    <div class="legend-group" title="X 軸投影">
                        <div class="dot-hollow" style="border-color:var(--color-b-x)"></div>
                        <span style="font-size:0.75rem; color:var(--color-b-x)">X</span>
                    </div>
                    <div class="legend-group" title="Y 軸投影">
                        <div class="dot-hollow" style="border-color:var(--color-b-y)"></div>
                        <span style="font-size:0.75rem; color:var(--color-b-y)">Y</span>
                    </div>
                </div>
                
                <div style="margin-top:5px; border-top:1px solid #444; padding-top:5px; text-align:center;">
                    <span id="time-display">T = 0.00s</span>
                </div>
            </div>

            <!-- 3. Stats -->
            <div class="panel-box stats">
                <div class="stat-group text-a">
                    <h4>Ball A</h4>
                    <div class="stat-row"><span>X:</span> <span id="val-xa">0.0</span></div>
                    <div class="stat-row"><span>Y:</span> <span id="val-ya">0.0</span></div>
                    <div class="stat-row"><span>Max H:</span> <span id="val-ha" class="stat-highlight">0.0</span></div>
                    <div class="stat-row"><span>Range:</span> <span id="val-ra" class="stat-highlight">0.0</span></div>
                    <div class="stat-divider"></div>
                    <div class="stat-row" style="color:var(--color-a-x)"><span>Vx:</span> <span id="val-vxa">0.0</span></div>
                    <div class="stat-row" style="color:var(--color-a-y)"><span>Vy:</span> <span id="val-vya">0.0</span></div>
                </div>
                <div class="stat-group text-b">
                    <h4>Ball B</h4>
                    <div class="stat-row"><span>X:</span> <span id="val-xb">0.0</span></div>
                    <div class="stat-row"><span>Y:</span> <span id="val-yb">0.0</span></div>
                    <div class="stat-row"><span>Max H:</span> <span id="val-hb" class="stat-highlight">0.0</span></div>
                    <div class="stat-row"><span>Range:</span> <span id="val-rb" class="stat-highlight">0.0</span></div>
                    <div class="stat-divider"></div>
                    <div class="stat-row" style="color:var(--color-b-x)"><span>Vx:</span> <span id="val-vxb">0.0</span></div>
                    <div class="stat-row" style="color:var(--color-b-y)"><span>Vy:</span> <span id="val-vyb">0.0</span></div>
                </div>
            </div>

        </div>
    </div>

    <div id="controls">
        <div class="global-controls">
            <button class="btn-a" onclick="startSim('A')">僅播放 A</button>
            <button class="btn-b" onclick="startSim('B')">僅播放 B</button>
            <button class="btn-both" onclick="startSim('BOTH')">同時播放</button>
            <button class="btn-reset" onclick="resetSim()">重置</button>
            
            <label class="checkbox-wrapper">
                <input type="checkbox" id="check-strobe" checked>
                <span>顯示頻閃照片</span>
            </label>

            <label class="checkbox-wrapper">
                <input type="checkbox" id="check-velocity">
                <span>顯示速度分量</span>
            </label>

            <label class="checkbox-wrapper">
                <input type="checkbox" id="check-half">
                <span>僅顯示到最高點</span>
            </label>
        </div>

        <div class="params-container">
            <div class="param-column col-a">
                <div class="col-header text-a">Ball A 參數</div>
                <div class="control-group">
                    <div class="label-row"><span>高度 H₀ (m)</span><input type="number" id="num-h0-a" value="0"></div>
                    <input type="range" id="range-h0-a" min="0" max="300" value="0">
                </div>
                <div class="control-group">
                    <div class="label-row"><span>速度 v₀ (m/s)</span><input type="number" id="num-v0-a" value="40"></div>
                    <input type="range" id="range-v0-a" min="10" max="100" value="40">
                </div>
                <div class="control-group">
                    <div class="label-row"><span>角度 θ (°)</span><input type="number" id="num-angle-a" value="45"></div>
                    <input type="range" id="range-angle-a" min="-90" max="90" value="45">
                </div>
            </div>

            <div class="param-column col-b">
                <div class="col-header text-b">Ball B 參數</div>
                <div class="control-group">
                    <div class="label-row"><span>高度 H₀ (m)</span><input type="number" id="num-h0-b" value="0"></div>
                    <input type="range" id="range-h0-b" min="0" max="300" value="0">
                </div>
                <div class="control-group">
                    <div class="label-row"><span>速度 v₀ (m/s)</span><input type="number" id="num-v0-b" value="60"></div>
                    <input type="range" id="range-v0-b" min="10" max="100" value="60">
                </div>
                <div class="control-group">
                    <div class="label-row"><span>角度 θ (°)</span><input type="number" id="num-angle-b" value="60"></div>
                    <input type="range" id="range-angle-b" min="-90" max="90" value="60">
                </div>
            </div>

            <div class="control-group" style="min-width: 200px; justify-content: center;">
                <div class="label-row"><span>頻閃分割數 (N)</span></div>
                <select id="select-interval" style="width:100%; padding:6px; background:#334155; color:white; border:1px solid #475569; border-radius:4px;">
                    <option value="5">5 張</option>
                    <option value="10" selected>10 張</option>
                    <option value="15">15 張</option>
                    <option value="20">20 張</option>
                </select>
                
                <div class="label-row" style="margin-top:10px;"><span>模擬速度</span></div>
                <input type="range" id="input-speed" min="0.1" max="2.0" step="0.1" value="1.0">
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    
    const g = 9.8;
    let simTime = 0;
    let isRunning = false;
    let animationId;
    let simSpeed = 1.0;
    let activeMode = 'BOTH'; 
    let isHalfMotion = false;
    let showStrobe = true;
    let showVelocity = false;
    let numSegments = 10;

    const ballA = { 
        h0: 0, v0: 40, angle: 45, 
        color: '#38bdf8', colorGhost: 'rgba(56, 189, 248, 0.5)',
        colorX: '#22d3ee', colorY: '#a855f7',
        path: [], snapshots: [], totalTime: 0 
    };
    
    const ballB = { 
        h0: 0, v0: 60, angle: 60, 
        color: '#fbbf24', colorGhost: 'rgba(251, 191, 36, 0.5)',
        colorX: '#facc15', colorY: '#ef4444',
        path: [], snapshots: [], totalTime: 0 
    };

    let scale = 2.0;
    const groundOffset = 50;
    // 重點修正：將起始點右移，避開左側面板
    const startX = 280; 
    const velocityScale = 1.5; 

    function bindInput(idRange, idNum, obj, prop) {
        const range = document.getElementById(idRange);
        const num = document.getElementById(idNum);
        
        const update = (val) => {
            val = parseFloat(val);
            obj[prop] = val;
            range.value = val;
            num.value = val;
            recalcPhysics();
            draw();
        };

        range.addEventListener('input', e => update(e.target.value));
        num.addEventListener('change', e => update(e.target.value));
        update(range.value);
    }

    bindInput('range-h0-a', 'num-h0-a', ballA, 'h0');
    bindInput('range-v0-a', 'num-v0-a', ballA, 'v0');
    bindInput('range-angle-a', 'num-angle-a', ballA, 'angle');

    bindInput('range-h0-b', 'num-h0-b', ballB, 'h0');
    bindInput('range-v0-b', 'num-v0-b', ballB, 'v0');
    bindInput('range-angle-b', 'num-angle-b', ballB, 'angle');

    document.getElementById('select-interval').addEventListener('change', (e) => {
        numSegments = parseInt(e.target.value);
        recalcPhysics();
        draw();
    });
    
    document.getElementById('input-speed').addEventListener('input', (e) => {
        simSpeed = parseFloat(e.target.value);
    });

    document.getElementById('check-strobe').addEventListener('change', (e) => {
        showStrobe = e.target.checked;
        draw();
    });

    document.getElementById('check-velocity').addEventListener('change', (e) => {
        showVelocity = e.target.checked;
        draw();
    });

    document.getElementById('check-half').addEventListener('change', (e) => {
        isHalfMotion = e.target.checked;
        recalcPhysics();
        draw();
    });

    function getProjectedFullTime(ball) {
        const rad = ball.angle * Math.PI / 180;
        const vy0 = ball.v0 * Math.sin(rad);
        const a = 0.5 * g;
        const b = -vy0;
        const c = -ball.h0;
        const delta = b*b - 4*a*c;
        if (delta < 0) return 0;
        return (-b + Math.sqrt(delta)) / (2*a);
    }

    function getLandingTime(ball) {
        const rad = ball.angle * Math.PI / 180;
        const vy0 = ball.v0 * Math.sin(rad);
        
        if (isHalfMotion && ball.angle > 0) {
            return vy0 / g; 
        }
        return getProjectedFullTime(ball);
    }

    function getPos(ball, t) {
        const effectiveT = Math.min(t, ball.totalTime);
        const rad = ball.angle * Math.PI / 180;
        const vx = ball.v0 * Math.cos(rad);
        const vy0 = ball.v0 * Math.sin(rad);
        
        const x = vx * effectiveT;
        const y = ball.h0 + (vy0 * effectiveT) - (0.5 * g * effectiveT * effectiveT);
        return { x, y: Math.max(0, y) };
    }

    function recalcPhysics() {
        [ballA, ballB].forEach(ball => {
            ball.totalTime = getLandingTime(ball);
            if (ball.totalTime < 0.1) ball.totalTime = 0.1;
            
            ball.snapshots = [];
            ball.path = [];
            
            for (let i = 0; i <= numSegments; i++) {
                let t = i * (ball.totalTime / numSegments);
                if (i === numSegments) t = ball.totalTime;
                const pos = getPos(ball, t);
                ball.snapshots.push({ x: pos.x, y: pos.y, t: t });
            }
        });
        updateStats();
    }

    function startSim(mode) {
        activeMode = mode;
        resetSim(false); 
        isRunning = true;
        lastFrameTime = performance.now();
        animate();
    }

    function resetSim(fullReset = true) {
        isRunning = false;
        cancelAnimationFrame(animationId);
        simTime = 0;
        ballA.path = [];
        ballB.path = [];
        recalcPhysics();
        draw();
    }

    let lastFrameTime = 0;
    function animate() {
        if (!isRunning) return;

        const now = performance.now();
        let dt = (now - lastFrameTime) / 1000;
        lastFrameTime = now;
        if (dt > 0.05) dt = 0.05;

        simTime += dt * simSpeed;

        let maxTime = 0;
        if (activeMode === 'A' || activeMode === 'BOTH') maxTime = Math.max(maxTime, ballA.totalTime);
        if (activeMode === 'B' || activeMode === 'BOTH') maxTime = Math.max(maxTime, ballB.totalTime);

        if (simTime >= maxTime) {
            simTime = maxTime;
            isRunning = false;
        }

        if (activeMode === 'A' || activeMode === 'BOTH') {
            const pos = getPos(ballA, simTime);
            if (simTime <= ballA.totalTime) ballA.path.push(pos);
        }
        if (activeMode === 'B' || activeMode === 'BOTH') {
            const pos = getPos(ballB, simTime);
            if (simTime <= ballB.totalTime) ballB.path.push(pos);
        }

        updateStats();
        draw();

        if (isRunning) {
            animationId = requestAnimationFrame(animate);
        }
    }

    function updateStats() {
        document.getElementById('time-display').innerText = `T = ${simTime.toFixed(2)}s`;

        const updateBallStats = (ball, suffix) => {
            const pos = getPos(ball, simTime);
            document.getElementById(`val-x${suffix}`).innerText = pos.x.toFixed(1);
            document.getElementById(`val-y${suffix}`).innerText = pos.y.toFixed(1);
            
            const rad = ball.angle * Math.PI / 180;
            let hMax = ball.h0;
            if (ball.angle > 0) {
                hMax += Math.pow(ball.v0 * Math.sin(rad), 2) / (2 * g);
            }
            document.getElementById(`val-h${suffix}`).innerText = hMax.toFixed(1);

            const vx = ball.v0 * Math.cos(rad);
            const fullTime = getProjectedFullTime(ball);
            const range = vx * fullTime;
            document.getElementById(`val-r${suffix}`).innerText = range.toFixed(1);

            const effectiveT = Math.min(simTime, ball.totalTime);
            const vy = ball.v0 * Math.sin(rad) - g * effectiveT;
            
            document.getElementById(`val-vx${suffix}`).innerText = vx.toFixed(1);
            document.getElementById(`val-vy${suffix}`).innerText = vy.toFixed(1);
        };

        updateBallStats(ballA, 'a');
        updateBallStats(ballB, 'b');
    }

    function resize() {
        const container = document.getElementById('canvas-container');
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        draw();
    }
    window.addEventListener('resize', resize);

    function drawArrow(ctx, fromX, fromY, toX, toY, color) {
        const headlen = 10; 
        const dx = toX - fromX;
        const dy = toY - fromY;
        const angle = Math.atan2(dy, dx);
        
        ctx.beginPath();
        ctx.moveTo(fromX, fromY);
        ctx.lineTo(toX, toY);
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(toX, toY);
        ctx.lineTo(toX - headlen * Math.cos(angle - Math.PI / 6), toY - headlen * Math.sin(angle - Math.PI / 6));
        ctx.lineTo(toX - headlen * Math.cos(angle + Math.PI / 6), toY - headlen * Math.sin(angle + Math.PI / 6));
        ctx.lineTo(toX, toY);
        ctx.fillStyle = color;
        ctx.fill();
    }

    function drawTextWithHalo(ctx, text, x, y, color) {
        ctx.lineWidth = 4;
        ctx.strokeStyle = '#0f172a'; 
        ctx.strokeText(text, x, y);
        ctx.fillStyle = color;
        ctx.fillText(text, x, y);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const originY = canvas.height - groundOffset;
        const toPxX = (m) => startX + m * scale;
        const toPxY = (m) => originY - m * scale;

        // 1. 繪製背景網格
        ctx.beginPath();
        ctx.moveTo(0, originY); ctx.lineTo(canvas.width, originY);
        ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 2; ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(startX, 0); ctx.lineTo(startX, canvas.height);
        ctx.strokeStyle = '#334155'; ctx.setLineDash([5, 5]); ctx.stroke(); ctx.setLineDash([]);

        const drawBallSet = (ball, isActive) => {
            if (!isActive) return;

            const rad = ball.angle * Math.PI / 180;
            const vx = ball.v0 * Math.cos(rad);
            const fullTime = getProjectedFullTime(ball);
            const range = vx * fullTime;
            const rangePx = toPxX(range);

            ctx.beginPath();
            ctx.moveTo(rangePx, originY);
            ctx.lineTo(rangePx - 5, originY + 8);
            ctx.lineTo(rangePx + 5, originY + 8);
            ctx.closePath();
            ctx.fillStyle = ball.color;
            ctx.fill();
            
            ctx.font = "bold 12px monospace";
            ctx.textAlign = "center";
            ctx.fillStyle = ball.color;
            ctx.fillText(`R`, rangePx, originY + 20);

            if (showStrobe) {
                ball.snapshots.forEach(snap => {
                    if (simTime >= snap.t) {
                        const sx = toPxX(snap.x);
                        const sy = toPxY(snap.y);
                        
                        ctx.beginPath(); ctx.arc(sx, sy, 8, 0, Math.PI*2);
                        ctx.fillStyle = ball.colorGhost; ctx.fill();
                        
                        ctx.beginPath(); ctx.arc(sx, originY, 6, 0, Math.PI*2);
                        ctx.strokeStyle = ball.colorX; ctx.lineWidth = 2; ctx.stroke();

                        ctx.beginPath(); ctx.arc(startX, sy, 6, 0, Math.PI*2);
                        ctx.strokeStyle = ball.colorY; ctx.lineWidth = 2; ctx.stroke();
                        
                        ctx.beginPath();
                        ctx.moveTo(sx, sy); ctx.lineTo(sx, originY);
                        ctx.moveTo(sx, sy); ctx.lineTo(startX, sy);
                        ctx.strokeStyle = ball.colorGhost; 
                        ctx.setLineDash([2,2]); ctx.stroke(); ctx.setLineDash([]);
                    }
                });
            }

            if (ball.path.length > 0) {
                ctx.beginPath();
                ctx.moveTo(toPxX(ball.path[0].x), toPxY(ball.path[0].y));
                for (let p of ball.path) ctx.lineTo(toPxX(p.x), toPxY(p.y));
                ctx.strokeStyle = ball.color; ctx.lineWidth = 3; ctx.stroke();
            }

            const currPos = getPos(ball, simTime);
            const cx = toPxX(currPos.x);
            const cy = toPxY(currPos.y);
            
            ctx.beginPath();
            ctx.moveTo(cx, cy); ctx.lineTo(cx, originY);
            ctx.moveTo(cx, cy); ctx.lineTo(startX, cy);
            ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.setLineDash([4,4]); ctx.stroke(); ctx.setLineDash([]);

            if (showVelocity) {
                const vx = ball.v0 * Math.cos(rad);
                const vy = ball.v0 * Math.sin(rad) - g * Math.min(simTime, ball.totalTime);
                
                const endX = cx + vx * velocityScale;
                drawArrow(ctx, cx, cy, endX, cy, ball.colorX);
                
                ctx.font = "bold 16px monospace";
                ctx.textAlign = "center";
                drawTextWithHalo(ctx, `vx=${vx.toFixed(1)}`, cx + (vx * velocityScale) / 2, cy - 20, ball.colorX);
                
                const endY = cy - vy * velocityScale;
                drawArrow(ctx, cx, cy, cx, endY, ball.colorY);

                ctx.textAlign = "left";
                const labelY = cy - (vy * velocityScale) / 2;
                drawTextWithHalo(ctx, `vy=${vy.toFixed(1)}`, cx + 20, labelY + 5, ball.colorY);
            }

            ctx.beginPath();
            ctx.arc(cx, cy, 12, 0, Math.PI*2);
            ctx.fillStyle = ball.color; ctx.fill();
            ctx.strokeStyle = 'white'; ctx.lineWidth = 2; ctx.stroke();
        };

        if (activeMode === 'A' || activeMode === 'BOTH') drawBallSet(ballA, true);
        if (activeMode === 'B' || activeMode === 'BOTH') drawBallSet(ballB, true);
    }

    resize();
    recalcPhysics();
    draw();

</script>
</body>
</html>
