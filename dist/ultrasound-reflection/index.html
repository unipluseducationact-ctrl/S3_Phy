<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slow Motion Ultrasound Model</title>
    <link rel="stylesheet" href="../shared/s3phy-embed.css">
    <script src="../shared/s3phy-embed-init.js"></script>
    <style>
        html.s3phy-embed body {
            height: auto;
            min-height: 100%;
            justify-content: flex-start;
            padding: 12px;
            box-sizing: border-box;
        }
        html.s3phy-embed .container {
            width: 100%;
            max-width: 800px;
            box-sizing: border-box;
        }
        html.s3phy-embed canvas {
            width: 100%;
            height: auto;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #0f0f0f;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #1a1a1a;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            width: 800px;
            text-align: center;
            border: 1px solid #333;
        }

        h2 { margin: 0 0 10px 0; color: #4fc3f7; font-weight: 400; letter-spacing: 1px; }
        .subtitle { color: #777; font-size: 0.9rem; margin-bottom: 20px; }

        canvas {
            background: #222;
            border-radius: 12px;
            border: 1px solid #333;
            margin-bottom: 20px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
            align-items: center;
        }

        button {
            padding: 12px 35px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-main { 
            background: linear-gradient(135deg, #4fc3f7, #0288d1); 
            color: #fff; 
            box-shadow: 0 4px 15px rgba(3, 169, 244, 0.3);
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(3, 169, 244, 0.5); }
        .btn-main:active { transform: scale(0.98); }

        .btn-reset { background: #333; color: #aaa; border: 1px solid #444; }
        .btn-reset:hover { background: #444; color: #fff; }

        .status-bar {
            display: flex;
            justify-content: space-between;
            background: #000;
            padding: 15px 25px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            border: 1px solid #333;
        }

        .highlight { color: #ffeb3b; font-weight: bold; }
        .status-text { color: #aaa; font-size: 0.9rem; }

    </style>
</head>
<body>

<div class="container">
    <h2>Ultrasound Reflection</h2>
    <div class="subtitle">Slow Motion Visualization • Point Object</div>
    
    <canvas id="simCanvas" width="800" height="320"></canvas>

    <div class="status-bar">
        <div>Time: <span id="timeDisplay" class="highlight">0.000 s</span></div>
        <div id="statusText" class="status-text">Ready to start</div>
    </div>

    <div class="controls" style="margin-top:25px;">
        <button class="btn-main" id="actionBtn" onclick="togglePlay()">▶ Start</button>
        <button class="btn-reset" onclick="resetSim()">↺ Reset</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    const timeDisplay = document.getElementById('timeDisplay');
    const statusText = document.getElementById('statusText');
    const actionBtn = document.getElementById('actionBtn');

    // --- Visual Configuration ---
    const START_X = 100;       // Generator
    const CAR_START_X = 350;   // Car Start (Visual 64m)
    const CAR_HIT_X = 650;     // Car Hit Position (Exaggerated d)
    const Y_AXIS = 160;

    // --- State ---
    let time = 0;
    let isRunning = false;
    let animationId;
    let hasPausedAtHit = false;

    // --- Drawing Functions ---
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. Grid/Background Lines
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 1;
        ctx.beginPath();
        for(let i=50; i<800; i+=50) { ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); }
        ctx.stroke();

        // 2. Main Axis
        ctx.beginPath();
        ctx.strokeStyle = '#666';
        ctx.lineWidth = 2;
        ctx.moveTo(50, Y_AXIS);
        ctx.lineTo(750, Y_AXIS);
        ctx.stroke();

        // 3. Generator (Source)
        ctx.fillStyle = '#0288d1';
        ctx.fillRect(START_X - 15, Y_AXIS - 15, 30, 30);
        ctx.fillStyle = '#81d4fa'; // Screen
        ctx.fillRect(START_X - 10, Y_AXIS - 10, 20, 20);
        ctx.fillStyle = '#aaa';
        ctx.font = "12px Arial";
        ctx.textAlign = "center";
        ctx.fillText("Source", START_X, Y_AXIS - 25);

        // 4. Calculate Positions
        // Map time (0 -> 0.2) to distance (START -> HIT)
        let progressOut = Math.min(time, 0.2) / 0.2;
        let progressIn = Math.max(0, time - 0.2) / 0.2;

        // Car Position (Constant Velocity visual)
        let carX = CAR_START_X + (time / 0.2) * (CAR_HIT_X - CAR_START_X);
        if(time > 0.4) carX = CAR_HIT_X + ((time-0.2)/0.2) * (CAR_HIT_X - CAR_START_X); // Keep moving

        // Signal Position
        let signalX;
        if (time <= 0.2) {
            signalX = START_X + progressOut * (CAR_HIT_X - START_X);
        } else {
            signalX = CAR_HIT_X - progressIn * (CAR_HIT_X - START_X);
        }

        // 5. Draw Ghost Car (Start Position)
        ctx.beginPath();
        ctx.arc(CAR_START_X, Y_AXIS, 3, 0, Math.PI*2);
        ctx.fillStyle = '#555';
        ctx.fill();
        // Dotted line for start
        ctx.beginPath(); ctx.setLineDash([4,4]); ctx.strokeStyle='#444';
        ctx.moveTo(CAR_START_X, Y_AXIS-40); ctx.lineTo(CAR_START_X, Y_AXIS+40);
        ctx.stroke(); ctx.setLineDash([]);

        // 6. Draw Real Car (Point Object)
        ctx.beginPath();
        ctx.arc(carX, Y_AXIS, 6, 0, Math.PI*2);
        ctx.fillStyle = '#ff4081'; // Pink
        ctx.shadowBlur = 15; ctx.shadowColor = 'rgba(255, 64, 129, 0.5)';
        ctx.fill(); ctx.shadowBlur = 0;
        
        ctx.fillStyle = '#ff4081';
        ctx.font = "bold 14px Arial";
        ctx.fillText("Car", carX, Y_AXIS - 15);

        // 7. Draw Signal Pulse
        if (time <= 0.4) {
            ctx.beginPath();
            // Pulse visual
            let pulseSize = 12;
            let dir = (time <= 0.2) ? 1 : -1; // Face right or left
            ctx.arc(signalX, Y_AXIS, pulseSize, -Math.PI/2, Math.PI/2, (dir === -1));
            ctx.strokeStyle = '#ffeb3b';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // Glow
            ctx.beginPath();
            ctx.arc(signalX, Y_AXIS, pulseSize-4, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(255, 235, 59, 0.3)';
            ctx.fill();
        }

        // 8. Annotations
        // 64m Bracket
        drawBracket(START_X, CAR_START_X, Y_AXIS + 50, "64 m", "#ccc");

        // 'd' Bracket (Only if car moved enough)
        if (carX > CAR_START_X + 2) {
            drawBracket(CAR_START_X, carX, Y_AXIS + 50, "d", "#ff4081");
        }

        // Collision Line
        if (time >= 0.2) {
            ctx.beginPath();
            ctx.setLineDash([4,4]); ctx.strokeStyle='#ff4081';
            ctx.moveTo(CAR_HIT_X, Y_AXIS-40); ctx.lineTo(CAR_HIT_X, Y_AXIS+40);
            ctx.stroke(); ctx.setLineDash([]);
        }
    }

    function drawBracket(x1, x2, y, text, color) {
        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.lineWidth = 1;
        ctx.moveTo(x1, y-5); ctx.lineTo(x1, y);
        ctx.lineTo(x2, y); ctx.lineTo(x2, y-5);
        ctx.stroke();
        ctx.fillStyle = color;
        ctx.font = "14px Arial";
        ctx.fillText(text, (x1+x2)/2, y + 20);
    }

    // --- Animation Loop ---
    function update() {
        if (!isRunning) return;

        // SLOW MOTION: Very small increment
        time += 0.0005; 

        // PAUSE LOGIC at 0.2s
        if (time >= 0.2 && !hasPausedAtHit) {
            time = 0.2; // Snap to exact
            hasPausedAtHit = true;
            isRunning = false; // Pause
            actionBtn.innerText = "▶ Resume";
            statusText.innerText = "Signal reached Car. Distance = 64m + d";
            statusText.style.color = "#ff4081";
            draw();
            return; 
        }

        // STOP LOGIC at 0.4s
        if (time >= 0.4) {
            time = 0.4;
            isRunning = false;
            actionBtn.innerText = "↺ Replay";
            statusText.innerText = "Signal returned to Source.";
            statusText.style.color = "#4fc3f7";
            draw();
            return;
        }

        timeDisplay.innerText = time.toFixed(3) + " s";
        draw();
        animationId = requestAnimationFrame(update);
    }

    function togglePlay() {
        if (time >= 0.4) {
            resetSim();
            return;
        }

        isRunning = !isRunning;
        if (isRunning) {
            actionBtn.innerText = "⏸ Pause";
            if (!hasPausedAtHit) {
                statusText.innerText = "Emitting Signal...";
                statusText.style.color = "#ffeb3b";
            } else {
                statusText.innerText = "Reflecting Signal...";
                statusText.style.color = "#ffeb3b";
            }
            update();
        } else {
            actionBtn.innerText = "▶ Resume";
            cancelAnimationFrame(animationId);
        }
    }

    function resetSim() {
        isRunning = false;
        cancelAnimationFrame(animationId);
        time = 0;
        hasPausedAtHit = false;
        actionBtn.innerText = "▶ Start";
        timeDisplay.innerText = "0.000 s";
        statusText.innerText = "Ready";
        statusText.style.color = "#aaa";
        draw();
    }

    window.togglePlay = togglePlay;
    window.resetSim = resetSim;

    // Init
    draw();

</script>

</body>
</html>
